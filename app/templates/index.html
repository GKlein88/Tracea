<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Tracéa — Premium Sport Wall Art</title>

    <link rel="stylesheet" href="/static/css/main.css">
</head>


<body>

    <!-- Header -->
    <header class="header">

        <div class="logo">
            Tracéa
        </div>

        <nav class="navigation">
            <a href="#how-it-works">How it works</a>
            <a href="#features">Features</a>
        </nav>

    </header>


    <!-- Main content -->
    <main>

        <!-- Hero section -->
        <section class="hero">

            <!-- Hero text (left side of the page) -->
            <div class="hero-content">

                <h1>
                    Turn your activities
                    into premium wall art.
                </h1>

                <!-- Hero  description -->
                <p class="hero-description"> 
                    Transform your runs, hikes and rides
                    into beautifully crafted posters.
                </p>

                <!-- Hero  CTA -->
                <input
                    type="file"
                    id="gpx-upload"
                    accept=".gpx"
                    hidden
                >

                <button
                    class="primary-button"
                    type="button"
                    id="upload-button"
                >
                    Upload activity
                </button>


                <p
                    id="file-name"
                    class="file-name"
                ></p>

                <!-- Hero  Note -->
                <span class="hero-note">
                    Your route · Your story · Your artwork
                </span>

                <!-- Hero  Benefits -->
                <div class="hero-benefits">

                    <div class="benefit-item">
                        <span class="benefit-icon">•</span>
                        SVG vector quality
                    </div>

                    <div class="benefit-item">
                        <span class="benefit-icon">•</span>
                        Print ready artwork
                    </div>

                    <div class="benefit-item">
                        <span class="benefit-icon">•</span>
                        Created from your GPX data
                    </div>

                </div>

            </div>


            <!-- Poster preview -->
            <div class="hero-visual">

                <div
                    class="poster-viewer"
                    id="poster-preview"
                >

                    <!-- Poster controls -->
                    <div class="poster-controls">

                        <div class="template-controls">

                            <button
                                class="poster-button previous-button"
                                id="previous-template"
                                data-tooltip="Previous design"
                                type="button"
                            >
                                <span class="icon previous-icon"></span>
                            </button>


                            <button
                                class="poster-button next-button"
                                id="next-template"
                                data-tooltip="Next design"
                                type="button"
                            >
                                <span class="icon next-icon"></span>
                            </button>

                        </div>


                        <button
                            class="poster-button maximize-button"
                            id="maximize-button"
                            data-tooltip="Focus mode"
                            type="button"
                        >
                            <span class="icon maximize-icon"></span>
                        </button>


                        <button
                            class="poster-button close-button"
                            id="close-button"
                            data-tooltip="Close"
                            type="button"
                        >
                            <span class="icon close-icon"></span>
                        </button>


                        <button
                            class="poster-button edit-button"
                            id="edit-button"
                            data-tooltip="Customize"
                            type="button"
                        >
                            <span class="icon edit-icon"></span>
                        </button>


                        <button
                            class="poster-button zoom-in-button"
                            id="zoom-in-button"
                            data-tooltip="Zoom in"
                            type="button"
                        >
                            <span class="icon zoom-in-icon"></span>
                        </button>


                        <button
                            class="poster-button zoom-out-button"
                            id="zoom-out-button"
                            data-tooltip="Zoom out"
                            type="button"
                        >
                            <span class="icon zoom-out-icon"></span>
                        </button>

                        <button
                            class="poster-button reset-button"
                            id="reset-zoom-button"
                            data-tooltip="Reset view"
                            type="button"
                        >
                            <span class="icon reset-icon"></span>
                        </button>

                    </div>


                    <!-- Poster content -->
                    <div
                        class="poster-content"
                        id="poster-content"
                    >

                        <div
                            class="poster-empty-state"
                            id="empty-state"
                        >
                            Your route<br>
                            becomes art.
                        </div>

                    </div>

                </div>


                <div
                    class="activity-info"
                    id="activity-info"
                ></div>

            </div>

        </section>

    </main>


    <!-- Footer -->
    <footer class="footer">
        <p>© 2026 Tracéa</p>
    </footer>


    <!-- Scripts -->
    <script src="/static/js/upload.js"></script>
    <script src="/static/js/poster-viewer.js"></script>

</body>

</html>
