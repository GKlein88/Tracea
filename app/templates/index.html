<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>
        Tracéa — Premium Sport Wall Art
    </title>


    <!-- Load fonts -->
    <link rel="stylesheet" href="/static/css/fonts.css">


    <!-- Load website styles -->
    <link rel="stylesheet" href="/static/css/style.css">

</head>


<body>

    <!-- Header -->
    <header class="header">

        <div class="logo">
            Tracéa
        </div>


        <nav class="navigation">

            <a href="#how-it-works">
                How it works
            </a>

            <a href="#features">
                Features
            </a>

        </nav>

    </header>



    <!-- Main content -->
    <main>


        <!-- Hero section -->
        <section class="hero">


            <!-- Left content -->
            <div class="hero-content">


                <h1>
                    Turn your activities
                    into premium wall art.
                </h1>


                <p class="hero-description">
                    Transform your runs, hikes and rides
                    into beautifully crafted posters.
                </p>


                <input
                    type="file"
                    id="gpx-upload"
                    accept=".gpx"
                    hidden
                >


                <button
                    class="primary-button"
                    type="button"
                    id="upload-button"
                >
                    Upload activity
                </button>


                <p
                    id="file-name"
                    class="file-name"
                >
                </p>


                <span class="hero-note">
                    Your route · Your story · Your artwork
                </span>

                <div class="hero-benefits">

                    <div class="benefit-item">
                        <span class="benefit-icon">•</span>
                        SVG vector quality
                    </div>


                    <div class="benefit-item">
                        <span class="benefit-icon">•</span>
                        Print ready artwork
                    </div>


                    <div class="benefit-item">
                        <span class="benefit-icon">•</span>
                        Created from your GPX data
                    </div>

                </div>


            </div>



            <!-- Right visual -->
            <div class="hero-visual">


                <div 
                    class="poster-placeholder"
                    id="poster-preview"
                >

                    <p id="placeholder-text">
                        Your route<br>
                        becomes art.
                    </p>

                </div>


                <div 
                    class="activity-info"
                    id="activity-info"
                >
                </div>


            </div>

        </section>

    </main>


    <!-- Footer -->
    <footer class="footer">

        <p>
            © 2026 Tracéa
        </p>

    </footer>

    <script src="/static/js/upload.js"></script>


</body>


</html>
